name: CI/CD MS Usuarios

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and Push a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_USUARIOS }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_USUARIOS }}:latest

      - name: Desplegar MS Usuarios vía SSM
        run: |
          # 1. Enviamos el comando y capturamos el ID
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_USUARIOS_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "set -e",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
                "docker pull ${{ secrets.ECR_REPO_URL_USUARIOS }}:latest",
                "docker stop ms-usuarios || true",
                "docker rm ms-usuarios || true",
                "TOKEN=$(curl -s -X PUT \"http://169.254.169.254/latest/api/token\" -H \"X-aws-ec2-metadata-token-ttl-seconds: 21600\")",
                "export EC2_IP=$(curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/local-ipv4)",
                "docker run -d --name ms-usuarios -p 8085:8085 -e JAVA_OPTS=\"-Xmx250m\" --memory=\"350m\" -e DB_URL=\"${{ secrets.DB_URL }}\" -e DB_USERNAME=\"${{ secrets.DB_USERNAME }}\" -e DB_PASSWORD=\"${{ secrets.DB_PASSWORD }}\" -e EUREKA_URL=\"${{ secrets.EUREKA_URL }}\" -e EUREKA_INSTANCE_PREFER_IP_ADDRESS=\"true\" -e EUREKA_INSTANCE_IP_ADDRESS=\"$EC2_IP\" ${{ secrets.ECR_REPO_URL_USUARIOS }}:latest"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)
            
          echo "Comando enviado con ID: $COMMAND_ID. Esperando ejecución en EC2..."
            
          # 2. Obligamos a GitHub a esperar a que la EC2 termine la tarea
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_USUARIOS_INSTANCE_ID }}
            
          # 3. Traemos los logs para verlos directo en GitHub
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_USUARIOS_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text